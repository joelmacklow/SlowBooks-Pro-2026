services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-slowbooks}
      POSTGRES_USER: ${POSTGRES_USER:-slowbooks}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD?set POSTGRES_PASSWORD in your .env or environment}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-slowbooks} -d ${POSTGRES_DB:-slowbooks}"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-slowbooks}
      POSTGRES_USER: ${POSTGRES_USER:-slowbooks}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD?set POSTGRES_PASSWORD in your .env or environment}
      POSTGRES_SSLMODE: ${POSTGRES_SSLMODE:-disable}
      APP_HOST: 0.0.0.0
      APP_PORT: ${APP_PORT:-3001}
      APP_DEBUG: ${APP_DEBUG:-false}
    ports:
      - "${APP_PORT:-3001}:3001"
    working_dir: /app
    volumes:
      - ./:/app:Z
    restart: unless-stopped
    command: ["/bin/sh", "/app/scripts/docker-entrypoint.sh"]

  invoice_reminder_scheduler:
    build:
      context: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-slowbooks}
      POSTGRES_USER: ${POSTGRES_USER:-slowbooks}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD?set POSTGRES_PASSWORD in your .env or environment}
      POSTGRES_SSLMODE: ${POSTGRES_SSLMODE:-disable}
      APP_HOST: 0.0.0.0
      APP_PORT: ${APP_PORT:-3001}
      APP_DEBUG: ${APP_DEBUG:-false}
      RUN_INVOICE_REMINDER_SCHEDULER: "true"
    working_dir: /app
    volumes:
      - ./:/app:Z
    restart: unless-stopped
    command: ["/bin/sh", "/app/scripts/docker-entrypoint.sh"]

volumes:
  postgres_data:
