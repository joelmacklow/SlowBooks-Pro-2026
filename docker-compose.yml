services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-slowbooks}
      POSTGRES_USER: ${POSTGRES_USER:-slowbooks}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD?set POSTGRES_PASSWORD in your .env or environment}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-slowbooks} -d ${POSTGRES_DB:-slowbooks}"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
    environment:
      DATABASE_URL: ${DATABASE_URL:-}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-slowbooks}
      POSTGRES_USER: ${POSTGRES_USER:-slowbooks}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD?set POSTGRES_PASSWORD in your .env or environment}
      POSTGRES_SSLMODE: ${POSTGRES_SSLMODE:-disable}
      APP_HOST: 0.0.0.0
      APP_PORT: ${APP_PORT:-3001}
      APP_DEBUG: ${APP_DEBUG:-false}
      BOOTSTRAP_ADMIN_TOKEN: ${BOOTSTRAP_ADMIN_TOKEN:-}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-slowbooks_session}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      SESSION_COOKIE_SAMESITE: ${SESSION_COOKIE_SAMESITE:-lax}
      SECURITY_HEADERS_ENABLE_HSTS: ${SECURITY_HEADERS_ENABLE_HSTS:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Slowbooks Pro}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
    ports:
      - "${APP_PORT:-3001}:3001"
    working_dir: /app
    volumes:
      - ./:/app:Z
    restart: unless-stopped

volumes:
  postgres_data:
